services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: jusmonitoria-postgres
    env_file: .env
    environment:
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jusmonitoria -d jusmonitoria"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: jusmonitoria-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: jusmonitoria-backend
    command: >
      sh -c "python -m scripts.db_prepare --mode=deploy &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - backend-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scraper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s  # db_prepare pode levar até ~60s no primeiro boot (migrate + seed + TPU)

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: jusmonitoria-worker
    command: taskiq worker app.workers.main:broker
    env_file: .env
    environment:
      PYTHONPATH: /app
      DB_PREPARE: "no"  # worker não roda migrations/seeds — só o backend faz isso
    volumes:
      - ./backend:/app
    networks:
      - backend-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scraper:
    build:
      context: ./scraper
      dockerfile: ../docker/scraper/Dockerfile
    container_name: jusmonitoria-scraper
    env_file: .env
    volumes:
      - ./scraper:/app
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4096M

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: jusmonitoria-frontend
    env_file: .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    networks:
      - backend-net
    depends_on:
      - backend

networks:
  backend-net:
    driver: bridge
    name: jusmonitoria-backend-net
  db-net:
    driver: bridge
    name: jusmonitoria-db-net

volumes:
  postgres_data:
    name: jusmonitoria-postgres-data
  redis_data:
    name: jusmonitoria-redis-data
  frontend_node_modules:
    name: jusmonitoria-frontend-node-modules

