version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: jusmonitor-postgres
    environment:
      POSTGRES_DB: jusmonitor
      POSTGRES_USER: jusmonitor
      POSTGRES_PASSWORD: jusmonitor_dev_password
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jusmonitor -d jusmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jusmonitor-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: jusmonitor-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://jusmonitor:jusmonitor_dev_password@postgres:5432/jusmonitor
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - backend-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: jusmonitor-worker
    command: taskiq worker app.workers.main:broker
    environment:
      DATABASE_URL: postgresql+asyncpg://jusmonitor:jusmonitor_dev_password@postgres:5432/jusmonitor
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app
    networks:
      - backend-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: jusmonitor-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - backend-net
    depends_on:
      - backend
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge
    name: jusmonitor-backend-net
  db-net:
    driver: bridge
    name: jusmonitor-db-net

volumes:
  postgres_data:
    name: jusmonitor-postgres-data
  redis_data:
    name: jusmonitor-redis-data
