version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: jusmonitor-postgres
    env_file: .env
    environment:
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jusmonitor -d jusmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: jusmonitor-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: jusmonitor-backend
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - backend-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: jusmonitor-worker
    command: taskiq worker app.workers.main:broker
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    networks:
      - backend-net
      - db-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: jusmonitor-frontend
    env_file: .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3001:3001"
    networks:
      - backend-net
    depends_on:
      - backend

networks:
  backend-net:
    driver: bridge
    name: jusmonitor-backend-net
  db-net:
    driver: bridge
    name: jusmonitor-db-net

volumes:
  postgres_data:
    name: jusmonitor-postgres-data
  redis_data:
    name: jusmonitor-redis-data
  frontend_node_modules:
    name: jusmonitor-frontend-node-modules
  frontend_next_cache:
    name: jusmonitor-frontend-next-cache
