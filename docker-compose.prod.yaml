# =============================================================================
# JusMonitorIA — Stack de Produção (deploy via Portainer / Docker Swarm)
# =============================================================================
# URL: https://jusmonitoriaia.witdev.com.br
# =============================================================================
# Pré-requisitos externos (já rodando em minha_rede):
#   - postgres  (porta 5432)
#   - redis     (porta 6379)
# =============================================================================

# ─── Âncora: variáveis de ambiente compartilhadas (backend + worker) ────────
x-backend-environment: &backend-environment
  TZ: "America/Sao_Paulo"
  ENVIRONMENT: "production"
  LOG_LEVEL: "WARNING"

  # PostgreSQL (externo — container "postgres" em minha_rede)
  DATABASE_URL: "postgresql+asyncpg://jusmonitoria:CHANGE_ME_DB_PASSWORD@postgres:5432/jusmonitoria"
  POSTGRES_DB: "jusmonitoria"
  POSTGRES_USER: "jusmonitoria"
  POSTGRES_PASSWORD: "CHANGE_ME_DB_PASSWORD"

  # Redis (externo — container "redis" em minha_rede)
  REDIS_URL: "redis://redis:6379/0"

  # Segurança / JWT
  SECRET_KEY: "CHANGE_ME_minimum_32_chars_production_secret"
  JWT_SECRET_KEY: "CHANGE_ME_minimum_32_chars_jwt_secret"

  # Super Admin
  SUPER_ADMIN_EMAIL: "witalo_rocha@hotmail.com"
  SUPER_ADMIN_PASSWORD: "CHANGE_ME_ADMIN_PASSWORD"

  # Instagram / Facebook
  FB_APP_ID: "593019070076189"
  FB_APP_SECRET: "20308e78a804591afd5d48d9a03a5450"
  INSTAGRAM_APP_ID: "1543909259581320"
  INSTAGRAM_APP_SECRET: "00add7cdbf3da20898a25ed06838566a"
  INSTAGRAM_CALLBACK_URL: "https://jusmonitoriaia.witdev.com.br/auth/instagram/callback"
  IG_VERIFY_TOKEN: "00add7cdbf3da20898a25ed06838566a00add7cdbf3da20898a25ed06838566a"
  IG_API_VERSION: "v23.0"

  # CORS
  CORS_ORIGINS: '["https://jusmonitoriaia.witdev.com.br"]'

# =============================================================================
# Serviços
# =============================================================================
services:

  # ─── Backend API ────────────────────────────────────────────────────────────
  backend:
    image: witrocha/jusmonitoria-backend:latest
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
             --worker-class uvicorn.workers.UvicornWorker
             --workers 4
             --bind 0.0.0.0:8000
             --timeout 120
             --graceful-timeout 30
             --access-logfile -"
    environment:
      <<: *backend-environment
      PYTHONPATH: /app
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
      labels:
        - "traefik.enable=true"
        # API routes
        - "traefik.http.routers.jusmonitoria_api.rule=Host(`jusmonitoriaia.witdev.com.br`) && PathPrefix(`/api`, `/docs`, `/openapi.json`, `/health`, `/metrics`)"
        - "traefik.http.routers.jusmonitoria_api.entrypoints=websecure"
        - "traefik.http.routers.jusmonitoria_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.jusmonitoria_api.priority=10"
        - "traefik.http.services.jusmonitoria_api.loadbalancer.server.port=8000"
        - "traefik.http.services.jusmonitoria_api.loadbalancer.passHostHeader=true"
        # WebSocket
        - "traefik.http.routers.jusmonitoria_ws.rule=Host(`jusmonitoriaia.witdev.com.br`) && PathPrefix(`/ws`)"
        - "traefik.http.routers.jusmonitoria_ws.entrypoints=websecure"
        - "traefik.http.routers.jusmonitoria_ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.jusmonitoria_ws.priority=10"
        - "traefik.http.services.jusmonitoria_ws.loadbalancer.server.port=8000"
        # Security headers
        - "traefik.http.routers.jusmonitoria_api.middlewares=jusmonitoria_secure@swarm"
        - "traefik.http.middlewares.jusmonitoria_secure.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.jusmonitoria_secure.headers.contentTypeNosniff=true"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # ─── Worker (Taskiq) ───────────────────────────────────────────────────────
  worker:
    image: witrocha/jusmonitoria-backend:latest
    command: >
      sh -c "taskiq worker app.workers.main:broker
             --workers 4
             --max-prefetch 10"
    environment:
      <<: *backend-environment
      PYTHONPATH: /app
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # ─── Scraper (Playwright isolado) ──────────────────────────────────────────
  scraper:
    image: witrocha/jusmonitoria-scraper:latest
    environment:
      TZ: "America/Sao_Paulo"
      ENVIRONMENT: "production"
      BD_HOST: "brd.superproxy.io:33335"
      BD_USERNAME: "brd-customer-hl_1311c64c-zone-jusmonitoria"
      BD_PASSWORD: "hm29tlz8nmbn"
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 4096M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    image: witrocha/jusmonitoria-frontend:latest
    environment:
      TZ: "America/Sao_Paulo"
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "https://jusmonitoriaia.witdev.com.br/api/v1"
      BACKEND_URL: "http://backend:8000"
    networks:
      - minha_rede
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 1024M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.jusmonitoria_front.rule=Host(`jusmonitoriaia.witdev.com.br`)"
        - "traefik.http.routers.jusmonitoria_front.entrypoints=websecure"
        - "traefik.http.routers.jusmonitoria_front.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.jusmonitoria_front.priority=1"
        - "traefik.http.services.jusmonitoria_front.loadbalancer.server.port=3001"
        - "traefik.http.services.jusmonitoria_front.loadbalancer.passHostHeader=true"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

# =============================================================================
# Networks
# =============================================================================
networks:
  minha_rede:
    external: true
    name: minha_rede
